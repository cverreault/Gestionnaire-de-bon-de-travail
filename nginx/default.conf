# ─── TaskMgr — Nginx reverse proxy ────────────────────────────────────────────
# Ce fichier est inclus dans le contexte http{} du nginx principal.

# ── Format de log custom ──────────────────────────────────────────────────────
log_format taskmgr_fmt '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time '
                       'uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" '
                       'urt="$upstream_response_time"';

# ── Compression Gzip ──────────────────────────────────────────────────────────
gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_proxied      any;
gzip_comp_level   6;
gzip_buffers      16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream backend_upstream {
    server backend:3000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

# ── Serveur principal ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log taskmgr_fmt;
    error_log  /var/log/nginx/error.log  warn;

    # Taille max des uploads (pièces jointes)
    client_max_body_size 50M;

    # ── En-têtes de sécurité (appliqués globalement) ──────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── Health check interne Nginx (pour Docker healthcheck) ─────────────────
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── API REST ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Désactiver keep-alive côté upstream pour les requêtes HTTP/1.1
        proxy_set_header   Connection        "";
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    # ── WebSocket — notifications temps-réel (future feature) ────────────────
    location /api/ws {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # Timeouts longs pour les connexions persistantes
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Uploads / pièces jointes ──────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Service worker & manifest — jamais en cache ────────────────────────
    location ~* (service-worker\.js|sw\.js|manifest\.json|manifest\.webmanifest)$ {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma        "no-cache";
        expires -1;
    }

    # ── Assets statiques — cache long terme (1 an) ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|avif)$ {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Frontend SPA (catch-all) ──────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Support WebSocket pour HMR (dev) et futures features
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
