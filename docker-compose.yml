# ─── TaskMgr — Docker Compose ─────────────────────────────────────────────────
# Ports NON-STANDARD (cohabitation avec d'autres containers) :
#   PostgreSQL  : 5434:5432
#   MinIO API   : 9010:9000  |  Console : 9011:9001
#   Backend     : 3800:3000
#   Frontend    : 3801:80
#   Nginx       : 8088:80  ← point d'entrée public routé depuis Nginx externe

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskmgr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-taskmgr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskmgr_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-taskmgr}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskmgr} -d ${POSTGRES_DB:-taskmgr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taskmgr-network
    labels:
      com.taskmgr.service:     "postgres"
      com.taskmgr.role:        "database"
      com.taskmgr.description: "PostgreSQL 16 — store de données principal"

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: taskmgr_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - taskmgr-network
    labels:
      com.taskmgr.service:     "minio"
      com.taskmgr.role:        "object-storage"
      com.taskmgr.description: "MinIO — stockage S3-compatible pour les pièces jointes"

  # ── Backend NestJS ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: taskmgr_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV:       production
      DATABASE_URL:   postgresql://${POSTGRES_USER:-taskmgr}:${POSTGRES_PASSWORD:-taskmgr_secret}@postgres:5432/${POSTGRES_DB:-taskmgr}
      MINIO_ENDPOINT: minio
      MINIO_PORT:     "9000"
    ports:
      - "3800:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - taskmgr-network
    labels:
      com.taskmgr.service:     "backend"
      com.taskmgr.role:        "api"
      com.taskmgr.description: "NestJS REST API — gestion des bons de travail"

  # ── Frontend React PWA ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: taskmgr_frontend
    restart: unless-stopped
    ports:
      - "3801:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - taskmgr-network
    labels:
      com.taskmgr.service:     "frontend"
      com.taskmgr.role:        "web"
      com.taskmgr.description: "React PWA — interface de gestion des tâches"

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: taskmgr_nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - taskmgr-network
    labels:
      com.taskmgr.service:     "nginx"
      com.taskmgr.role:        "reverse-proxy"
      com.taskmgr.description: "Nginx — point d'entrée public sur :8088"

# ─── Volumes nommés (persistance) ─────────────────────────────────────────────
volumes:
  postgres_data:
    name: taskmgr_postgres_data
  minio_data:
    name: taskmgr_minio_data

# ─── Réseau dédié isolé ───────────────────────────────────────────────────────
networks:
  taskmgr-network:
    name: taskmgr-network
    driver: bridge
