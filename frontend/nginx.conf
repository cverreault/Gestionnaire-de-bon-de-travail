server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;

    # ── Health check Docker ────────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Service worker & manifest — jamais en cache ────────────────────────────
    location ~* (service-worker\.js|sw\.js|manifest\.json|manifest\.webmanifest)$ {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # ── Assets statiques — cache long terme (1 an) ────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA React — fallback vers index.html (React Router) ───────────────────
    # index.html ne doit JAMAIS être mis en cache par le navigateur :
    # il référence des bundles JS/CSS aux noms hashés, et un index.html périmé
    # ferait charger un ancien bundle après un déploiement (menu manquant,
    # bug déjà corrigé, etc.). Les bundles eux-mêmes restent en cache long terme
    # grâce à leur hash dans l'URL.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
