name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Unit tests
        # --forceExit: AuditCleanupService registers a timer that isn't torn
        # down in the unit context; without it jest can flag a suite failed
        # on the "worker failed to exit" warning even when all tests pass.
        run: npm test -- --forceExit
      - name: Build
        run: npm run build

  backend-integration:
    name: Backend (integration tests, real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskmgr
          POSTGRES_PASSWORD: taskmgr_secret
          POSTGRES_DB: taskmgr
        # The integration npm script hardcodes DATABASE_URL on port 5434.
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U taskmgr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Create dedicated test database
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=taskmgr_secret psql -h localhost -p 5434 -U taskmgr -d taskmgr \
            -c "CREATE DATABASE taskmgr_test;"
      - name: Integration tests
        # The script sets DATABASE_URL (taskmgr_test), JWT + MinIO env and
        # --runInBand; bootIntegrationApp runs `prisma migrate deploy` itself.
        # MinIO is not provided: MinioService.ensureBucket() is best-effort
        # and doesn't fail the boot when the object store is unreachable.
        run: npm run test:integration

  frontend:
    name: Frontend (typecheck + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npx vitest run
      - name: Build (tsc + vite)
        run: npm run build
